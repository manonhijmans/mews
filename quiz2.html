    q: "What was the booking value boost MAH Hotel achieved using a separate Mews booking engine for day-use rooms and co-working?",
    options: ["4% boost", "7% boost", "9% boost", "15% boost"],
    answer: 2,
    explanation: "MAH Hotel provides day use rooms and co-working spaces for business travelers, all bookable in a separate booking engine that boosts booking value by 9%."
  },

  // ── ADVANCED / TRICKY ─────────────────────────────────────────────────────
];

// ── State ──────────────────────────────────────────────────────────────────
let queue = [];        // ids not yet shown this round
let missedIds = [];    // ids answered wrong — will be re-queued
let correctIds = [];   // ids answered correctly
let seenIds = [];      // ids answered at least once (drives "Answered" counter)
let currentQ = null;   // the live question currently on screen
let answered = false;  // whether the live question has been answered
let history = [];      // [{q, answeredIdx}] — every question shown so far
let histPos = -1;      // index into history when browsing back; -1 = live

function initQueue() { queue = shuffle([...ALL_QUESTIONS.map(q => q.id)]); }
function shuffle(a) { for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function getQ(id) { return ALL_QUESTIONS.find(q => q.id === id); }

// ── Core quiz flow ─────────────────────────────────────────────────────────
function nextQuestion() {
  if (histPos !== -1) {
    // User is browsing history and clicked Next Question — jump back to live
    histPos = -1;
    renderLive();
    return;
  }
  if (queue.length === 0 && missedIds.length > 0) {
    queue = shuffle([...missedIds]);
    missedIds = [];
    showRoundComplete();
    return;
  }
  if (queue.length === 0 && missedIds.length === 0) {
    showFinalResult();
    return;
  }
  const id = queue.shift();
  currentQ = getQ(id);
  answered = false;
  history.push({ q: currentQ, answeredIdx: null });
  histPos = -1;
  renderLive();
  updateStats();
}

// Render the live (current) question — interactive if not yet answered
function renderLive() {
  render(currentQ, answered, answered ? history[history.length-1].answeredIdx : null, true);
  updateStats();
}

// ── Render ─────────────────────────────────────────────────────────────────
// isLive: true = this is the current question (show Next btn if answered)
// readonly: show answered state but no clickable options
function render(q, readonly, selectedIdx, isLive) {
  const atStart  = (histPos === -1 && history.length <= 1) || histPos === 0;
  const atLive   = histPos === -1;

  const optionsHtml = q.options.map((opt, i) => {
    let cls = '';
    if (readonly && selectedIdx !== null && selectedIdx !== undefined) {
      if (i === selectedIdx && selectedIdx === q.answer) cls = 'correct disabled';
      else if (i === selectedIdx && selectedIdx !== q.answer) cls = 'wrong disabled';
      else if (i === q.answer) cls = 'reveal-correct disabled';
      else cls = 'disabled';
    }
    const click = (!readonly) ? `onclick="selectAnswer(${i})"` : '';
    return `<button class="option ${cls}" ${click}>${opt}</button>`;
  }).join('');

  const feedbackHtml = (readonly && selectedIdx !== null && selectedIdx !== undefined)
    ? `<div class="feedback ${selectedIdx === q.answer ? 'correct' : 'wrong'} show">
         <strong>${selectedIdx === q.answer ? '✓ Correct!' : '✗ Not quite.'}</strong> ${q.explanation}
       </div>`
    : `<div class="feedback" id="feedback"></div>`;

  const nextBtnHtml = (isLive && readonly)
    ? `<button class="next-btn show" onclick="nextQuestion()">Next Question →</button>`
    : '';

  document.getElementById('quiz-content').innerHTML = `
    <div class="category-badge">${q.category}</div>
    <div class="question-card">
      <div class="question-num">Question #${q.id}</div>
      <div class="question-text">${q.q}</div>
      <div class="options">${optionsHtml}</div>
      ${feedbackHtml}
      ${nextBtnHtml}
    </div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="goPrev()" ${atStart ? 'disabled' : ''}>← Previous</button>
      <button class="nav-btn" onclick="goNext()" ${atLive ? 'disabled' : ''}>Next →</button>
    </div>`;
}

// ── Answer selection ───────────────────────────────────────────────────────
function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  if (!seenIds.includes(currentQ.id)) seenIds.push(currentQ.id);

  const q = currentQ;
  document.querySelectorAll('.option').forEach(o => o.classList.add('disabled'));
  const fb = document.getElementById('feedback');
  const nb = document.getElementById('next-btn');  // may not exist yet

  if (idx === q.answer) {
    document.querySelectorAll('.option')[idx].classList.add('correct');
    fb.className = 'feedback correct show';
    fb.innerHTML = `<strong>✓ Correct!</strong> ${q.explanation}`;
    if (!correctIds.includes(q.id)) correctIds.push(q.id);
    missedIds = missedIds.filter(id => id !== q.id);
  } else {
    document.querySelectorAll('.option')[idx].classList.add('wrong');
    document.querySelectorAll('.option')[q.answer].classList.add('reveal-correct');
    fb.className = 'feedback wrong show';
    fb.innerHTML = `<strong>✗ Not quite.</strong> ${q.explanation}`;
    if (!missedIds.includes(q.id)) missedIds.push(q.id);
    correctIds = correctIds.filter(id => id !== q.id);
  }

  // Record answer in history
  history[history.length - 1].answeredIdx = idx;

  // Show Next button
  if (nb) {
    nb.classList.add('show');
  } else {
    // Re-render live to get the Next button to appear
    renderLive();
  }
  updateStats();
}

// ── Prev / Next navigation ─────────────────────────────────────────────────
function goPrev() {
  // Determine where we currently are
  const curIdx = (histPos === -1) ? history.length - 1 : histPos;
  if (curIdx <= 0) return; // already at first question

  histPos = curIdx - 1;
  const entry = history[histPos];
  const isLive = false; // browsing history — never "live"
  render(entry.q, entry.answeredIdx !== null, entry.answeredIdx, isLive);
}

function goNext() {
  if (histPos === -1) return; // already at live question

  const liveIdx = history.length - 1;

  if (histPos >= liveIdx) {
    // Step back to live
    histPos = -1;
    renderLive();
    return;
  }

  histPos++;
  const entry = history[histPos];
  const nowAtLive = (histPos === liveIdx);

  if (nowAtLive) {
    histPos = -1; // snap back to live mode
    renderLive();
  } else {
    render(entry.q, entry.answeredIdx !== null, entry.answeredIdx, false);
  }
}

// ── Stats ──────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('stat-answered').textContent = seenIds.length;
  document.getElementById('stat-correct').textContent  = correctIds.length;
  document.getElementById('stat-missed').textContent   = missedIds.length;
  document.getElementById('stat-total').textContent    = ALL_QUESTIONS.length - seenIds.length;
  const pct = ALL_QUESTIONS.length > 0 ? (seenIds.length / ALL_QUESTIONS.length * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ── Round complete / final result ─────────────────────────────────────────
function showRoundComplete() {
  const pct = Math.round((correctIds.length / seenIds.length) * 100) || 0;
  document.getElementById('quiz-content').innerHTML = `
    <div class="results-card">
      <div class="results-score">${pct}%</div>
      <div class="results-label">Round Complete!</div>
      <p style="color:#aaa;margin-top:10px;font-size:13px;">All questions seen once.<br>Now drilling what you missed!</p>
      <div class="results-detail">
        <div class="results-stat"><div class="num" style="color:#22c55e">${correctIds.length}</div><div class="lbl">Correct</div></div>
        <div class="results-stat"><div class="num" style="color:#ef4444">${missedIds.length}</div><div class="lbl">Missed</div></div>
      </div><br>
      <button class="restart-btn" onclick="nextQuestion()">Retry Missed →</button>
    </div>`;
  updateStats();
}

function showFinalResult() {
  const pct = Math.round((correctIds.length / ALL_QUESTIONS.length) * 100) || 0;
  const msg = pct===100 ? "🏆 Perfect!" : pct>=80 ? "🎉 Excellent!" : pct>=60 ? "👍 Good progress!" : "📚 Keep studying!";
  document.getElementById('quiz-content').innerHTML = `
    <div class="results-card">
      <div class="results-score">${pct}%</div>
      <div class="results-label">${msg}</div>
      <div class="results-detail">
        <div class="results-stat"><div class="num" style="color:#22c55e">${correctIds.length}</div><div class="lbl">Correct</div></div>
        <div class="results-stat"><div class="num" style="color:#ef4444">${ALL_QUESTIONS.length - correctIds.length}</div><div class="lbl">Missed</div></div>
        <div class="results-stat"><div class="num">${ALL_QUESTIONS.length}</div><div class="lbl">Total</div></div>
      </div><br>
      <button class="restart-btn" onclick="restartQuiz()">Start Fresh</button>
      <button class="restart-btn secondary" onclick="showSection('review', document.querySelectorAll('.nav-tab')[1])">View Answers</button>
    </div>`;
}

function restartQuiz() {
  queue=[]; missedIds=[]; correctIds=[]; seenIds=[];
  currentQ=null; answered=false; history=[]; histPos=-1;
  initQueue(); nextQuestion();
}

// ── Section switching ──────────────────────────────────────────────────────
let currentFilter = 'all';
function showSection(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'review') renderReview(currentFilter);
}

function filterReview(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderReview(filter);
}

function renderReview(filter) {
  let qs = ALL_QUESTIONS;
  if (filter === 'missed')  qs = ALL_QUESTIONS.filter(q => missedIds.includes(q.id));
  if (filter === 'correct') qs = ALL_QUESTIONS.filter(q => correctIds.includes(q.id));
  if (filter === 'unseen')  qs = ALL_QUESTIONS.filter(q => !seenIds.includes(q.id));
  const list = document.getElementById('review-list');
  if (qs.length === 0) { list.innerHTML = '<div class="empty-state">No questions in this filter yet.</div>'; return; }
  list.innerHTML = qs.map(q => {
    let lbl = 'Not yet seen', cls = 'unseen';
    if (correctIds.includes(q.id)) { lbl = '✓ Got it right'; cls = 'seen'; }
    else if (missedIds.includes(q.id)) { lbl = '✗ Needs review'; cls = 'missed'; }
    else if (seenIds.includes(q.id)) { lbl = 'Seen'; cls = 'seen'; }
    return `<div class="review-item"><div class="r-cat">${q.category}</div><div class="r-q">${q.q}</div><div class="r-a">${q.options[q.answer]}</div><div class="r-status ${cls}">${lbl}</div></div>`;
  }).join('');
}

// ── Init ───────────────────────────────────────────────────────────────────
initQueue();
nextQuestion();
</script>
