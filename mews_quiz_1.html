// ── STATE ──────────────────────────────────────────────────────────────────
let queue = [];       // question ids in current session order
let missedIds = [];   // ids answered wrong, to re-queue
let correctIds = [];  // ids answered correctly
let seenIds = [];     // all ids shown at least once
let currentQ = null;
let answered = false;
let history = [];     // [{q, answeredIdx}] for prev navigation
let historyPos = -1;  // index into history; -1 = live mode

function initQueue() {
  // Fresh session: shuffle all questions
  const ids = ALL_QUESTIONS.map(q => q.id);
  queue = shuffle([...ids]);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getQuestion(id) {
  return ALL_QUESTIONS.find(q => q.id === id);
}

function nextQuestion() {
  // If queue empty but there are missed questions, re-queue them (shuffled)
  if (queue.length === 0 && missedIds.length > 0) {
    queue = shuffle([...missedIds]);
    missedIds = [];
    // Show a congratulations / round complete screen first
    showRoundComplete();
    return;
  }
  if (queue.length === 0 && missedIds.length === 0) {
    showFinalResult();
    return;
  }
  const id = queue.shift();
  currentQ = getQuestion(id);
  if (!seenIds.includes(id)) seenIds.push(id);
  answered = false;
  history.push({ q: currentQ, answeredIdx: null });
  historyPos = -1; // back to live
  renderQuestion(currentQ, false);
  updateStats();
}

function renderQuestion(q, readonly, selectedIdx) {
  const isLive = !readonly;
  const hasPrev = history.length > 1;
  // In readonly (history browse) mode, show the answered state
  const html = `
    <div class="category-badge">${q.category}</div>
    <div class="question-card">
      <div class="question-num">Question #${q.id} of ${ALL_QUESTIONS.length}</div>
      <div class="question-text">${q.q}</div>
      <div class="options" id="options-list">
        ${q.options.map((opt, i) => {
          let cls = '';
          if (readonly && selectedIdx !== null && selectedIdx !== undefined) {
            if (i === selectedIdx && selectedIdx === q.answer) cls = 'correct disabled';
            else if (i === selectedIdx && selectedIdx !== q.answer) cls = 'wrong disabled';
            else if (i === q.answer) cls = 'reveal-correct disabled';
            else cls = 'disabled';
          }
          const clickHandler = (!readonly) ? `onclick="selectAnswer(${i})"` : '';
          return `<button class="option ${cls}" data-idx="${i}" ${clickHandler}>${opt}</button>`;
        }).join('')}
      </div>
      ${readonly && selectedIdx !== null && selectedIdx !== undefined ? `
        <div class="feedback ${selectedIdx === q.answer ? 'correct' : 'wrong'} show">
          <strong>${selectedIdx === q.answer ? '✓ Correct!' : '✗ Not quite.'}</strong> ${q.explanation}
        </div>` : `<div class="feedback" id="feedback"></div>`}
      ${isLive ? `<button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question →</button>` : ''}
    </div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="goPrev()" ${history.length <= 1 ? 'disabled' : ''}>← Previous</button>
      <button class="nav-btn" onclick="goNext()" ${historyPos === -1 ? 'disabled' : ''}>Next →</button>
    </div>
  `;
  document.getElementById('quiz-content').innerHTML = html;
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = currentQ;
  const options = document.querySelectorAll('.option');
  options.forEach(o => o.classList.add('disabled'));

  const feedback = document.getElementById('feedback');
  const nextBtn = document.getElementById('next-btn');

  if (idx === q.answer) {
    options[idx].classList.add('correct');
    feedback.className = 'feedback correct show';
    feedback.innerHTML = `<strong>✓ Correct!</strong> ${q.explanation}`;
    if (!correctIds.includes(q.id)) correctIds.push(q.id);
    // Remove from missed if it was there
    missedIds = missedIds.filter(id => id !== q.id);
  } else {
    options[idx].classList.add('wrong');
    options[q.answer].classList.add('reveal-correct');
    feedback.className = 'feedback wrong show';
    feedback.innerHTML = `<strong>✗ Not quite.</strong> ${q.explanation}`;
    if (!missedIds.includes(q.id)) missedIds.push(q.id);
    correctIds = correctIds.filter(id => id !== q.id);
  }

  // Record answer in history
  if (history.length > 0) history[history.length - 1].answeredIdx = idx;

  nextBtn.classList.add('show');
  updateStats();
}

function updateStats() {
  document.getElementById('stat-answered').textContent = seenIds.length;
  document.getElementById('stat-correct').textContent = correctIds.length;
  document.getElementById('stat-missed').textContent = missedIds.length;
  document.getElementById('stat-total').textContent = queue.length;

  const pct = (seenIds.length / ALL_QUESTIONS.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function showRoundComplete() {
  const pct = Math.round((correctIds.length / seenIds.length) * 100) || 0;
  document.getElementById('quiz-content').innerHTML = `
    <div class="results-card">
      <div class="results-score">${pct}%</div>
      <div class="results-label">Round Complete!</div>
      <p style="color:#aaa; margin-top:12px; font-size:14px;">You've gone through all questions once.<br>Now let's drill the ones you missed!</p>
      <div class="results-detail">
        <div class="results-stat"><div class="num" style="color:#22c55e">${correctIds.length}</div><div class="lbl">Correct</div></div>
        <div class="results-stat"><div class="num" style="color:#ef4444">${missedIds.length}</div><div class="lbl">Missed</div></div>
      </div>
      <br>
      <button class="restart-btn" onclick="nextQuestion()">Retry Missed Questions →</button>
    </div>
  `;
  updateStats();
}

function showFinalResult() {
  const pct = Math.round((correctIds.length / ALL_QUESTIONS.length) * 100) || 0;
  let msg = pct === 100 ? "🏆 Perfect score! You're ready for day one!" :
            pct >= 80 ? "🎉 Excellent! You know your Mews." :
            pct >= 60 ? "👍 Good progress! Keep reviewing the missed ones." :
            "📚 Keep studying — you'll get there!";
  document.getElementById('quiz-content').innerHTML = `
    <div class="results-card">
      <div class="results-score">${pct}%</div>
      <div class="results-label">${msg}</div>
      <div class="results-detail">
        <div class="results-stat"><div class="num" style="color:#22c55e">${correctIds.length}</div><div class="lbl">Correct</div></div>
        <div class="results-stat"><div class="num" style="color:#ef4444">${ALL_QUESTIONS.length - correctIds.length}</div><div class="lbl">Missed</div></div>
        <div class="results-stat"><div class="num">${ALL_QUESTIONS.length}</div><div class="lbl">Total</div></div>
      </div>
      <br>
      <button class="restart-btn" onclick="restartQuiz()">Start Fresh</button>
      <button class="restart-btn secondary" onclick="showSection('review')">View All Answers</button>
    </div>
  `;
}

function goPrev() {
  // Determine current absolute index in history
  const liveIdx = history.length - 1;
  const curIdx = historyPos === -1 ? liveIdx : historyPos;
  if (curIdx <= 0) return;
  historyPos = curIdx - 1;
  const entry = history[historyPos];
  renderQuestion(entry.q, true, entry.answeredIdx);
}

function goNext() {
  if (historyPos === -1) return; // already at live question
  const liveIdx = history.length - 1;
  if (historyPos >= liveIdx) {
    // Return to live question
    historyPos = -1;
    renderQuestion(currentQ, !answered, answered ? history[liveIdx].answeredIdx : null);
    if (answered) {
      const nextBtn = document.getElementById('next-btn');
      if (nextBtn) nextBtn.classList.add('show');
    }
    return;
  }
  historyPos++;
  const entry = history[historyPos];
  const isLive = historyPos === liveIdx;
  if (isLive) historyPos = -1;
  renderQuestion(entry.q, isLive ? !answered : true, entry.answeredIdx);
  if (isLive && answered) {
    const nextBtn = document.getElementById('next-btn');
    if (nextBtn) nextBtn.classList.add('show');
  }
}

function restartQuiz() {
  queue = [];
  missedIds = [];
  correctIds = [];
  seenIds = [];
  currentQ = null;
  answered = false;
  history = [];
  historyPos = -1;
  initQueue();
  nextQuestion();
}

// ── REVIEW SECTION ─────────────────────────────────────────────────────────
let currentFilter = 'all';
function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'review') renderReview(currentFilter);
}

function filterReview(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderReview(filter);
}

function renderReview(filter) {
  const list = document.getElementById('review-list');
  let questions = ALL_QUESTIONS;
  if (filter === 'missed') questions = ALL_QUESTIONS.filter(q => missedIds.includes(q.id));
  else if (filter === 'correct') questions = ALL_QUESTIONS.filter(q => correctIds.includes(q.id));
  else if (filter === 'unseen') questions = ALL_QUESTIONS.filter(q => !seenIds.includes(q.id));

  if (questions.length === 0) {
    list.innerHTML = '<div class="empty-state">No questions in this category yet.</div>';
    return;
  }

  list.innerHTML = questions.map(q => {
    let statusLabel = 'Not yet seen';
    let statusClass = 'unseen';
    if (correctIds.includes(q.id)) { statusLabel = '✓ Got it right'; statusClass = 'seen'; }
    else if (missedIds.includes(q.id)) { statusLabel = '✗ Needs review'; statusClass = 'missed'; }
    else if (seenIds.includes(q.id)) { statusLabel = 'Seen'; statusClass = 'seen'; }
    return `
      <div class="review-item">
        <div class="r-category">${q.category}</div>
        <div class="r-q">${q.q}</div>
        <div class="r-a">${q.options[q.answer]}</div>
        <div class="r-status ${statusClass}">${statusLabel}</div>
      </div>
    `;
  }).join('');
}

// ── INIT ───────────────────────────────────────────────────────────────────
initQueue();
nextQuestion();
</script>
