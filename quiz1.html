  // ── CUSTOMER ONBOARDING & DEPLOYMENT ──────────────────────────────────────
];

let queue=[],missedIds=[],correctIds=[],seenIds=[],currentQ=null,answered=false,history=[],historyPos=-1;

function initQueue(){queue=shuffle([...ALL_QUESTIONS.map(q=>q.id)]);}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getQ(id){return ALL_QUESTIONS.find(q=>q.id===id);}

function nextQuestion(){
  if(queue.length===0&&missedIds.length>0){queue=shuffle([...missedIds]);missedIds=[];showRoundComplete();return;}
  if(queue.length===0&&missedIds.length===0){showFinalResult();return;}
  const id=queue.shift();currentQ=getQ(id);
  answered=false;
  history.push({q:currentQ,answeredIdx:null});historyPos=-1;
  renderQuestion(currentQ,false,null);updateStats();
}

function renderQuestion(q,readonly,selectedIdx){
  const isLive=!readonly;
  const html=`
    <div class="category-badge">${q.category}</div>
    <div class="question-card">
      <div class="question-num">Question #${q.id}</div>
      <div class="question-text">${q.q}</div>
      <div class="options">${q.options.map((opt,i)=>{
        let cls='';
        if(readonly&&selectedIdx!==null&&selectedIdx!==undefined){
          if(i===selectedIdx&&selectedIdx===q.answer)cls='correct disabled';
          else if(i===selectedIdx&&selectedIdx!==q.answer)cls='wrong disabled';
          else if(i===q.answer)cls='reveal-correct disabled';
          else cls='disabled';
        }
        const click=(!readonly)?`onclick="selectAnswer(${i})"`:'' ;
        return `<button class="option ${cls}" ${click}>${opt}</button>`;
      }).join('')}</div>
      ${readonly&&selectedIdx!==null&&selectedIdx!==undefined?`
        <div class="feedback ${selectedIdx===q.answer?'correct':'wrong'} show">
          <strong>${selectedIdx===q.answer?'✓ Correct!':'✗ Not quite.'}</strong> ${q.explanation}
        </div>`:`<div class="feedback" id="feedback"></div>`}
      ${isLive?`<button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question →</button>`:''}
    </div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="goPrev()" ${history.length<=1?'disabled':''}>← Previous</button>
      <button class="nav-btn" onclick="goNext()" ${historyPos===-1?'disabled':''}>Next →</button>
    </div>`;
  document.getElementById('quiz-content').innerHTML=html;
}

function selectAnswer(idx){
  if(answered)return;answered=true;
  if(!seenIds.includes(currentQ.id))seenIds.push(currentQ.id);
  const q=currentQ;
  document.querySelectorAll('.option').forEach(o=>o.classList.add('disabled'));
  const fb=document.getElementById('feedback'),nb=document.getElementById('next-btn');
  if(idx===q.answer){
    document.querySelectorAll('.option')[idx].classList.add('correct');
    fb.className='feedback correct show';fb.innerHTML=`<strong>✓ Correct!</strong> ${q.explanation}`;
    if(!correctIds.includes(q.id))correctIds.push(q.id);
    missedIds=missedIds.filter(id=>id!==q.id);
  }else{
    document.querySelectorAll('.option')[idx].classList.add('wrong');
    document.querySelectorAll('.option')[q.answer].classList.add('reveal-correct');
    fb.className='feedback wrong show';fb.innerHTML=`<strong>✗ Not quite.</strong> ${q.explanation}`;
    if(!missedIds.includes(q.id))missedIds.push(q.id);
    correctIds=correctIds.filter(id=>id!==q.id);
  }
  if(history.length>0)history[history.length-1].answeredIdx=idx;
  nb.classList.add('show');updateStats();
}

function goPrev(){
  const liveIdx=history.length-1,curIdx=historyPos===-1?liveIdx:historyPos;
  if(curIdx<=0)return;
  historyPos=curIdx-1;
  const e=history[historyPos];renderQuestion(e.q,true,e.answeredIdx);
}

function goNext(){
  if(historyPos===-1)return;
  const liveIdx=history.length-1;
  if(historyPos>=liveIdx){
    historyPos=-1;renderQuestion(currentQ,!answered,answered?history[liveIdx].answeredIdx:null);
    if(answered){const nb=document.getElementById('next-btn');if(nb)nb.classList.add('show');}
    return;
  }
  historyPos++;
  const e=history[historyPos],isLive=historyPos===liveIdx;
  if(isLive)historyPos=-1;
  renderQuestion(e.q,isLive?!answered:true,e.answeredIdx);
  if(isLive&&answered){const nb=document.getElementById('next-btn');if(nb)nb.classList.add('show');}
}

function updateStats(){
  document.getElementById('stat-answered').textContent=seenIds.length;
  document.getElementById('stat-correct').textContent=correctIds.length;
  document.getElementById('stat-missed').textContent=missedIds.length;
  document.getElementById('stat-total').textContent=queue.length;
  document.getElementById('progress-fill').style.width=(seenIds.length/ALL_QUESTIONS.length*100)+'%';
}

function showRoundComplete(){
  const pct=Math.round((correctIds.length/seenIds.length)*100)||0;
  document.getElementById('quiz-content').innerHTML=`
    <div class="results-card">
      <div class="results-score">${pct}%</div>
      <div class="results-label">Round Complete!</div>
      <p style="color:#aaa;margin-top:10px;font-size:13px;">All questions seen once.<br>Now drilling what you missed!</p>
      <div class="results-detail">
        <div class="results-stat"><div class="num" style="color:#22c55e">${correctIds.length}</div><div class="lbl">Correct</div></div>
        <div class="results-stat"><div class="num" style="color:#ef4444">${missedIds.length}</div><div class="lbl">Missed</div></div>
      </div><br>
      <button class="restart-btn" onclick="nextQuestion()">Retry Missed →</button>
    </div>`;updateStats();
}

function showFinalResult(){
  const pct=Math.round((correctIds.length/ALL_QUESTIONS.length)*100)||0;
  const msg=pct===100?"🏆 Perfect!":pct>=80?"🎉 Excellent!":pct>=60?"👍 Good progress!":"📚 Keep studying!";
  document.getElementById('quiz-content').innerHTML=`
    <div class="results-card">
      <div class="results-score">${pct}%</div>
      <div class="results-label">${msg}</div>
      <div class="results-detail">
        <div class="results-stat"><div class="num" style="color:#22c55e">${correctIds.length}</div><div class="lbl">Correct</div></div>
        <div class="results-stat"><div class="num" style="color:#ef4444">${ALL_QUESTIONS.length-correctIds.length}</div><div class="lbl">Missed</div></div>
        <div class="results-stat"><div class="num">${ALL_QUESTIONS.length}</div><div class="lbl">Total</div></div>
      </div><br>
      <button class="restart-btn" onclick="restartQuiz()">Start Fresh</button>
      <button class="restart-btn secondary" onclick="switchToReview()">View Answers</button>
    </div>`;
}

function switchToReview(){
  showSection('review', document.querySelectorAll('.nav-tab')[1]);
}

function restartQuiz(){
  queue=[];missedIds=[];correctIds=[];seenIds=[];currentQ=null;answered=false;history=[];historyPos=-1;
  initQueue();nextQuestion();
}

let currentFilter='all';
function showSection(name,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  if(btn)btn.classList.add('active');
  if(name==='review')renderReview(currentFilter);
}

function filterReview(filter,btn){
  currentFilter=filter;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderReview(filter);
}

function renderReview(filter){
  let qs=ALL_QUESTIONS;
  if(filter==='missed')qs=ALL_QUESTIONS.filter(q=>missedIds.includes(q.id));
  else if(filter==='correct')qs=ALL_QUESTIONS.filter(q=>correctIds.includes(q.id));
  else if(filter==='unseen')qs=ALL_QUESTIONS.filter(q=>!seenIds.includes(q.id));
  const list=document.getElementById('review-list');
  if(qs.length===0){list.innerHTML='<div class="empty-state">No questions in this filter yet.</div>';return;}
  list.innerHTML=qs.map(q=>{
    let lbl='Not yet seen',cls='unseen';
    if(correctIds.includes(q.id)){lbl='✓ Got it right';cls='seen';}
    else if(missedIds.includes(q.id)){lbl='✗ Needs review';cls='missed';}
    else if(seenIds.includes(q.id)){lbl='Seen';cls='seen';}
    return `<div class="review-item"><div class="r-cat">${q.category}</div><div class="r-q">${q.q}</div><div class="r-a">${q.options[q.answer]}</div><div class="r-status ${cls}">${lbl}</div></div>`;
  }).join('');
}

initQueue();nextQuestion();
</script>
</body>
</html>
